<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito in Costruzione</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* CAMBIA L'URL TRA LE VIRGOLETTE CON L'IMMAGINE CHE PREFERISCI */
            background: url('https://unsplash.com/photos/nYIQYg8cQVc/download?force=true') no-repeat center center/cover;
            color: #ffffff;
            overflow: hidden;
        }
        /* Effetto scuro sullo sfondo per far risaltare il testo */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #ffffff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo {
            max-width: 80%; /* Impedisce al logo di essere troppo grande */
            max-height: 120px; /* Evita che il logo diventi gigantesco */
            height: auto;
            display: block;
            margin: 0 auto 1.5rem auto; /* Lo centra e mette spazio sotto */
        }
        p {
            font-size: 1.1rem;
            font-weight: 300;
            color: #e5e5e5;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Prossimamente</div>
        <img src="logo.png" alt="Binario Band" class="logo">
        <p>Il nostro nuovo spazio digitale è in preparazione. Torna a trovarci presto!</p>
    </div>

</body>
</html>
